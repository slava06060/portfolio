<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio</title>

    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page">

        <!-- NAVIGATION -->

        <nav class="navbar">
            <div class="logo">Portfolio</div>

            <div class="nav-links">
                <a href="#gallery">My Work</a>
                <a href="#projects">Projects</a>
                <a href="#about">About Me</a>
            </div>
        </nav>

        <!-- HERO -->

        <section class="hero">

            <!-- BIG ARTWORK BACKGROUND -->

            <div class="hero-artwork">
                <img src="images/big-artwork.png" alt="">
                <div class="fade-bottom"></div>
            </div>

            <!-- LEFT SIDE -->

            <div class="about-container">

                <div class="character-card">

                    <img
                        src="images/me.png"
                        alt="Me"
                        class="artist-image"
                    >

                    <div class="about-box">

                        <h2>Hello!</h2>

                        <p>
                            I'm a visual artist who enjoys creating
                            portraits, still life pieces and nature-inspired
                            artwork. Welcome to my creative world.
                        </p>

                    </div>

                </div>

                <button class="about-btn">
                    More About Me
                </button>

            </div>

        </section>

        <!-- GALLERY -->

        <section id="gallery" class="gallery">

            <div class="art-card">
                <div class="card-image">
                    <img src="images/portrait.jpg" alt="">
                </div>

                <div class="card-content">
                    <h3>Portrait</h3>
                    <p>Expressive portrait artworks.</p>
                </div>
            </div>

            <div class="art-card">
                <div class="card-image">
                    <img src="images/still-life.jpg" alt="">
                </div>

                <div class="card-content">
                    <h3>Still Life</h3>
                    <p>Classic observational studies.</p>
                </div>
            </div>

            <div class="art-card">
                <div class="card-image">
                    <img src="images/nature.jpg" alt="">
                </div>

                <div class="card-content">
                    <h3>Nature</h3>
                    <p>Landscapes and natural beauty.</p>
                </div>
            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
